<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Feedback</title>
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 600px;
        margin: 60px auto;
        padding: 0 20px;
        background: #f7f7f9;
        color: #222;
    }
    h1 { font-size: 1.6rem; margin-bottom: 4px; }
    p.subtitle { color: #666; margin-top: 0; }
    textarea {
        width: 100%;
        min-height: 120px;
        padding: 12px;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        resize: vertical;
    }
    button {
        margin-top: 12px;
        padding: 10px 20px;
        font-size: 1rem;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    #result {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        display: none;
    }
    #result.success { background: #dcfce7; color: #166534; display: block; }
    #result.error { background: #fee2e2; color: #991b1b; display: block; }
</style>
</head>
<body>

<h1>Presentation Feedback</h1>
<p class="subtitle">Let us know what you thought — a sentence or two is great.</p>

<textarea id="feedbackText" placeholder="Type your feedback here..."></textarea>
<br>
<button id="submitBtn">Submit Feedback</button>

<div id="result"></div>

<script>
const submitBtn = document.getElementById('submitBtn');
const feedbackText = document.getElementById('feedbackText');
const result = document.getElementById('result');

submitBtn.addEventListener('click', async () => {
    const text = feedbackText.value.trim();
    result.className = '';
    result.style.display = 'none';

    if (!text) {
        result.textContent = 'Please enter some feedback first.';
        result.className = 'error';
        result.style.display = 'block';
        return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting...';

    try {
        // Relative path — always hits whatever host/port the page was
        // loaded from. Never hardcode a port here.
        const response = await fetch('/submit_feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ feedback: text })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || `Server responded with ${response.status}`);
        }

        result.textContent = `Thanks! Sentiment detected: ${data.label} (polarity: ${data.polarity})`;
        result.className = 'success';
        result.style.display = 'block';
        feedbackText.value = '';

    } catch (err) {
        console.error('Submit failed:', err);
        result.textContent = `Something went wrong: ${err.message}`;
        result.className = 'error';
        result.style.display = 'block';
    } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Feedback';
    }
});
</script>

</body>
</html>
